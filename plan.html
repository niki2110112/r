<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주간 계획표 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .chart-container { position: relative; width: 100%; max-width: 320px; margin: auto; height: 260px; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 800; }
        .group-btn-active { background-color: #3b82f6; color: white; box-shadow: 0 2px 4px -1px rgba(59, 130, 246, 0.3); }
        
        /* 커스텀 입력 필드 스타일 */
        .editable-input { background: transparent; border: 1px solid transparent; border-radius: 6px; transition: all 0.2s; }
        .editable-input:hover { background: rgba(0,0,0,0.04); border-color: #e2e8f0; }
        .editable-input:focus { outline: none; border-color: #3b82f6; background: #ffffff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .week-view-col { min-height: 200px; flex: 1; min-w-[140px]; }

        /* 체크박스 버튼 스타일 */
        .day-chk-label { display: flex; align-items: center; justify-content: center; width: 2.5rem; height: 2.5rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; background-color: #f8fafc; color: #64748b; font-weight: 700; font-size: 0.875rem; cursor: pointer; transition: all 0.15s; }
        .day-chk-input:checked + .day-chk-label { background-color: #eff6ff; border-color: #3b82f6; color: #2563eb; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 네비게이션 -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 flex justify-between h-14 items-center">
            <h1 class="font-black text-lg text-slate-800 tracking-tight">PLANNER <span class="text-blue-600 font-bold text-xs ml-1 bg-blue-50 px-2 py-0.5 rounded-full">v19.0</span></h1>
            <div class="flex space-x-2 sm:space-x-6 text-sm font-semibold">
                <button onclick="nav('dashboard')" id="nav-dashboard" class="nav-link tab-active py-4 px-1 transition-colors">대시보드</button>
                <button onclick="nav('schedule')" id="nav-schedule" class="nav-link py-4 px-1 text-slate-500 hover:text-slate-800 transition-colors">일정 관리</button>
                <button onclick="nav('settings')" id="nav-settings" class="nav-link py-4 px-1 text-slate-500 hover:text-slate-800 transition-colors">설정</button>
            </div>
        </div>
    </nav>

    <!-- 상단 주차 컨트롤러 -->
    <div class="max-w-5xl mx-auto px-4 w-full mt-6 mb-2">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 flex justify-between items-center">
            <button onclick="changeWeek(-1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 hover:bg-slate-100 rounded-xl font-bold text-slate-600 transition-colors border border-slate-100">◀</button>
            <div class="text-center flex-grow">
                <span id="current-week-display" class="font-black text-2xl text-slate-800 tracking-tight">2026-W01</span>
                <p id="current-week-dates" class="text-xs text-slate-500 font-semibold mt-0.5"></p>
            </div>
            <button onclick="changeWeek(1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 hover:bg-slate-100 rounded-xl font-bold text-slate-600 transition-colors border border-slate-100">▶</button>
        </div>
    </div>

    <main class="flex-grow max-w-5xl mx-auto px-4 py-4 w-full">
        <!-- 1. 대시보드 뷰 -->
        <section id="view-dashboard" class="view block animate-fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
                <div class="space-y-4">
                    <div>
                        <h2 class="text-xl font-black text-slate-800 mb-1">주간 분석</h2>
                        <p class="text-slate-500 text-xs font-semibold" id="dashboard-status">데이터 동기화 중...</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3" id="stats-grid"></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center">
                    <h3 class="font-bold text-slate-700 text-sm mb-4 w-full text-left">시간 분배율</h3>
                    <div class="chart-container w-full"><canvas id="balanceChart"></canvas></div>
                </div>
            </div>
        </section>

        <!-- 2. 일정 관리 뷰 -->
        <section id="view-schedule" class="view hidden animate-fade-in">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <!-- 뷰 토글 -->
                <div class="flex bg-slate-200/60 p-1 rounded-xl">
                    <button onclick="setViewMode('daily')" id="btn-view-daily" class="px-5 py-2 rounded-lg text-sm font-bold bg-white text-blue-700 shadow-sm transition-all">일간</button>
                    <button onclick="setViewMode('weekly')" id="btn-view-weekly" class="px-5 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition-all">주간 (가로)</button>
                </div>
                <!-- 액션 버튼 -->
                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="btn-copy-prev" onclick="copyPreviousWeek()" class="hidden flex-1 sm:flex-none bg-slate-100 text-slate-600 border border-slate-200 px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-200 transition-colors">
                        이전 주 복사
                    </button>
                    <button onclick="openEventModal()" class="flex-1 sm:flex-none bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-sm hover:bg-blue-700 transition-colors">
                        + 새 일정
                    </button>
                </div>
            </div>

            <!-- 일간 보기 영역 -->
            <div id="daily-view-container" class="block">
                <!-- 평일/주말 토글 -->
                <div class="flex gap-2 mb-4">
                    <button onclick="toggleGroup('weekday')" id="grp-weekday" class="group-btn px-5 py-2 rounded-xl text-sm font-bold group-btn-active transition-colors">평일</button>
                    <button onclick="toggleGroup('weekend')" id="grp-weekend" class="group-btn px-5 py-2 rounded-xl text-sm font-bold bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors">주말</button>
                </div>
                <!-- 요일 탭 -->
                <div id="day-tabs" class="flex gap-2 mb-4 overflow-x-auto pb-2 scrollbar-hide"></div>
                
                <!-- 타임라인 컨테이너 -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-slate-50/50 border-b border-slate-100 p-4">
                        <span class="font-black text-slate-800 text-lg" id="current-day-label">월요일</span>
                    </div>
                    <div class="p-4 sm:p-6 min-h-[300px] bg-slate-50/20">
                        <div id="timeline-body" class="space-y-3"></div>
                    </div>
                </div>
            </div>

            <!-- 주간 보기 영역 -->
            <div id="weekly-view-container" class="hidden">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 overflow-x-auto">
                    <div id="weekly-grid" class="flex gap-3 min-w-[1000px]">
                        <!-- 동적 렌더링 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 3. 데이터 관리 뷰 -->
        <section id="view-settings" class="view hidden animate-fade-in max-w-2xl mx-auto space-y-6">
            
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <h3 class="font-black text-lg mb-4 text-slate-800 border-b border-slate-100 pb-3">카테고리 관리</h3>
                <div id="category-list" class="flex flex-wrap gap-2 mb-6"></div>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <h4 class="text-xs font-bold text-slate-500 mb-2">새 카테고리 추가</h4>
                    <div class="flex gap-2 items-center">
                        <input type="text" id="new-cat-name" placeholder="카테고리 이름" class="flex-grow border border-slate-300 px-3 py-2.5 rounded-xl text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all">
                        <input type="color" id="new-cat-color" value="#6366f1" class="w-11 h-11 rounded-xl cursor-pointer border-0 bg-transparent p-0">
                        <button onclick="addCategory()" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-900 transition-colors">추가</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm space-y-6">
                <div>
                    <h3 class="font-black text-lg mb-1 text-slate-800">데이터 백업/복구</h3>
                    <p class="text-xs text-slate-500 mb-4 font-medium">현재 선택된 주차(<span id="settings-week-label" class="text-blue-600 font-bold"></span>)의 데이터만 처리됩니다.</p>
                    <div class="flex gap-2">
                        <button onclick="exportData()" class="flex-1 bg-white border border-slate-300 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-50 transition-colors">내보내기</button>
                        <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData()">
                        <button onclick="document.getElementById('import-file').click()" class="flex-1 bg-white border border-blue-200 text-blue-600 px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-blue-50 transition-colors">불러오기</button>
                    </div>
                </div>
                <div class="pt-6 border-t border-rose-50">
                    <button onclick="resetCurrentWeekData()" class="bg-rose-50 text-rose-600 border border-rose-100 px-6 py-3 rounded-xl text-sm font-bold w-full hover:bg-rose-100 transition-colors">현재 주차 데이터 전체 삭제</button>
                </div>
            </div>
        </section>
    </main>

    <!-- 일정 추가 모달 -->
    <div id="event-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 animate-fade-in border border-slate-100">
            <h3 class="font-black text-xl mb-5 text-slate-800 tracking-tight">새 일정 등록</h3>
            <div class="space-y-5">
                <!-- 일정명 -->
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase tracking-wider">일정명</label>
                    <input type="text" id="modal-task" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all font-bold text-slate-800" placeholder="예: 운동, 독서">
                </div>
                
                <!-- 카테고리 & 시간 -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase tracking-wider">카테고리</label>
                        <select id="modal-cat" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all font-bold text-slate-800"></select>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 mb-1.5 uppercase tracking-wider">시간</label>
                        <input type="text" id="modal-time" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-all font-bold text-slate-800 text-center" value="09:00-10:00">
                    </div>
                </div>
                
                <hr class="border-slate-100">

                <!-- 반복 기간 -->
                <div>
                    <label class="block text-[11px] font-bold text-blue-600 mb-2 uppercase tracking-wider">반복 적용 기간</label>
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-slate-400 w-8">시작</span>
                            <input type="week" id="modal-start-week" class="flex-grow bg-white border border-slate-300 p-2.5 rounded-xl text-sm outline-none focus:border-blue-500 transition-all font-medium text-slate-700">
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-slate-400 w-8">종료</span>
                            <input type="week" id="modal-end-week" class="flex-grow bg-white border border-slate-300 p-2.5 rounded-xl text-sm outline-none focus:border-blue-500 transition-all font-medium text-slate-700">
                        </div>
                    </div>
                </div>

                <!-- 적용 요일 -->
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 mb-2 uppercase tracking-wider">적용 요일</label>
                    <div class="flex gap-1.5 justify-between">
                        <div>
                            <input type="checkbox" id="chk-mon" class="day-chk-input hidden modal-day-chk" value="mon">
                            <label for="chk-mon" class="day-chk-label">월</label>
                        </div>
                        <div>
                            <input type="checkbox" id="chk-tue" class="day-chk-input hidden modal-day-chk" value="tue">
                            <label for="chk-tue" class="day-chk-label">화</label>
                        </div>
                        <div>
                            <input type="checkbox" id="chk-wed" class="day-chk-input hidden modal-day-chk" value="wed">
                            <label for="chk-wed" class="day-chk-label">수</label>
                        </div>
                        <div>
                            <input type="checkbox" id="chk-thu" class="day-chk-input hidden modal-day-chk" value="thu">
                            <label for="chk-thu" class="day-chk-label">목</label>
                        </div>
                        <div>
                            <input type="checkbox" id="chk-fri" class="day-chk-input hidden modal-day-chk" value="fri">
                            <label for="chk-fri" class="day-chk-label">금</label>
                        </div>
                        <div>
                            <input type="checkbox" id="chk-sat" class="day-chk-input hidden modal-day-chk" value="sat">
                            <label for="chk-sat" class="day-chk-label text-blue-500">토</label>
                        </div>
                        <div>
                            <input type="checkbox" id="chk-sun" class="day-chk-input hidden modal-day-chk" value="sun">
                            <label for="chk-sun" class="day-chk-label text-rose-500">일</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-8 flex gap-2">
                <button onclick="closeEventModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl font-bold transition-colors">취소</button>
                <button onclick="saveRecurringEvent()" id="modal-save-btn" class="flex-1 py-3 bg-blue-600 text-white hover:bg-blue-700 rounded-xl font-bold transition-colors shadow-sm">저장</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase 설정 (환경에 맞게 유지)
        const firebaseConfig = {
            apiKey: "AIzaSyBI8ox-eYSoM48mFuShwxiTlIna8eyaX6o",
            authDomain: "meal-c8b86.firebaseapp.com",
            projectId: "meal-c8b86",
            storageBucket: "meal-c8b86.firebasestorage.app",
            messagingSenderId: "476361866831",
            appId: "1:476361866831:web:d1f841697bcfb76dee743a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentWeekStr = ""; 
        let currentWeekData = null;
        let userSettings = null;
        let unsubscribeWeek = null;
        
        let currentGroup = "weekday";
        let activeDay = "mon";
        let viewMode = "daily";
        let balanceChart = null;
        
        // 요일 순서 강제 고정 배열
        const DAY_ORDER = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];

        const DEFAULT_SETTINGS = {
            categories: {
                class: { label: "수업", color: "#3b82f6" },
                study: { label: "학습", color: "#0ea5e9" },
                project: { label: "프로젝트", color: "#8b5cf6" },
                routine: { label: "기타", color: "#94a3b8" }
            }
        };

        const DEFAULT_WEEK_TEMPLATE = {
            mon: { group: "weekday", title: "월요일", events: [] },
            tue: { group: "weekday", title: "화요일", events: [] },
            wed: { group: "weekday", title: "수요일", events: [] },
            thu: { group: "weekday", title: "목요일", events: [] },
            fri: { group: "weekday", title: "금요일", events: [] },
            sat: { group: "weekend", title: "토요일", events: [] },
            sun: { group: "weekend", title: "일요일", events: [] }
        };

        function getYearWeek(date) {
            const d = new Date(date);
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7));
            const year = d.getFullYear();
            const week = Math.ceil((((d - new Date(year, 0, 1)) / 86400000) + 1) / 7);
            return `${year}-W${week.toString().padStart(2, '0')}`;
        }

        function weekToDate(weekStr) {
            const [year, week] = weekStr.split('-W').map(Number);
            const d = new Date(year, 0, 1);
            const days = (week - 1) * 7;
            d.setDate(d.getDate() + days - (d.getDay() || 7) + 1);
            return d;
        }

        function calculateHours(timeStr) {
            try {
                const parts = timeStr.split('-');
                if (parts.length !== 2) return 0;
                const parseTime = (t) => {
                    const [h, m] = t.split(':').map(Number);
                    return isNaN(h) || isNaN(m) ? null : h + (m / 60);
                };
                const start = parseTime(parts[0].trim());
                const end = parseTime(parts[1].trim());
                if (start === null || end === null) return 0;
                let diff = end - start;
                if (diff < 0) diff += 24;
                return Number(diff.toFixed(2));
            } catch (e) { return 0; }
        }

        function hexToRgba(hex, alpha) {
            if(!hex) return `rgba(148, 163, 184, ${alpha})`;
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        async function initApp() {
            currentWeekStr = getYearWeek(new Date());
            
            db.collection("sync_data").doc("settings").onSnapshot((doc) => {
                if (doc.exists) {
                    userSettings = doc.data();
                } else {
                    userSettings = DEFAULT_SETTINGS;
                    db.collection("sync_data").doc("settings").set(userSettings);
                }
                renderCategorySettings();
                if(currentWeekData) { updateStats(); renderActiveView(); }
            });

            loadWeekData();
        }

        function loadWeekData() {
            if (unsubscribeWeek) unsubscribeWeek();

            updateWeekUI();
            
            const docRef = db.collection("sync_data").doc(`week_${currentWeekStr}`);
            unsubscribeWeek = docRef.onSnapshot((doc) => {
                if (doc.exists) {
                    currentWeekData = doc.data();
                    document.getElementById('btn-copy-prev').classList.add('hidden');
                } else {
                    currentWeekData = { schedule: JSON.parse(JSON.stringify(DEFAULT_WEEK_TEMPLATE)) };
                    saveWeekData();
                    document.getElementById('btn-copy-prev').classList.remove('hidden');
                }
                updateStats();
                renderActiveView();
            });
        }

        function saveWeekData() {
            db.collection("sync_data").doc(`week_${currentWeekStr}`).set(currentWeekData);
        }

        function saveSettings() {
            db.collection("sync_data").doc("settings").set(userSettings);
        }

        function changeWeek(offset) {
            const date = weekToDate(currentWeekStr);
            date.setDate(date.getDate() + (offset * 7));
            currentWeekStr = getYearWeek(date);
            loadWeekData();
        }

        function updateWeekUI() {
            document.getElementById('current-week-display').innerText = currentWeekStr;
            document.getElementById('settings-week-label').innerText = currentWeekStr;
            const startD = weekToDate(currentWeekStr);
            const endD = new Date(startD); endD.setDate(startD.getDate() + 6);
            const format = (d) => `${d.getMonth()+1}.${d.getDate()}`;
            document.getElementById('current-week-dates').innerText = `${format(startD)} ~ ${format(endD)}`;
            document.getElementById('dashboard-status').innerText = `${currentWeekStr} 동기화 완료`;
        }

        async function copyPreviousWeek() {
            const date = weekToDate(currentWeekStr);
            date.setDate(date.getDate() - 7);
            const prevWeekStr = getYearWeek(date);
            
            const prevDoc = await db.collection("sync_data").doc(`week_${prevWeekStr}`).get();
            if(prevDoc.exists) {
                currentWeekData = prevDoc.data();
                saveWeekData();
                document.getElementById('btn-copy-prev').classList.add('hidden');
            }
        }

        function nav(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('tab-active', 'text-slate-500'));
            document.getElementById(`nav-${viewId}`).classList.add('tab-active');
            
            if(viewId === 'schedule') renderActiveView();
            if(viewId === 'dashboard') initChart();
        }

        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById('btn-view-daily').className = mode === 'daily' ? 'px-5 py-2 rounded-lg text-sm font-bold bg-white text-blue-700 shadow-sm transition-all' : 'px-5 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition-all';
            document.getElementById('btn-view-weekly').className = mode === 'weekly' ? 'px-5 py-2 rounded-lg text-sm font-bold bg-white text-blue-700 shadow-sm transition-all' : 'px-5 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-800 transition-all';
            
            if(mode === 'daily') {
                document.getElementById('daily-view-container').classList.remove('hidden');
                document.getElementById('weekly-view-container').classList.add('hidden');
                renderTabs();
            } else {
                document.getElementById('daily-view-container').classList.add('hidden');
                document.getElementById('weekly-view-container').classList.remove('hidden');
                renderWeeklyView();
            }
        }

        function renderActiveView() {
            if(viewMode === 'daily') renderTabs();
            else renderWeeklyView();
        }

        function updateStats() {
            if(!currentWeekData || !userSettings) return;
            const totals = {};
            Object.keys(userSettings.categories).forEach(k => totals[k] = 0);
            
            Object.values(currentWeekData.schedule).forEach(day => {
                day.events.forEach(ev => { 
                    if(totals[ev.cat] !== undefined) totals[ev.cat] += ev.hours;
                    else totals[ev.cat] = ev.hours;
                });
            });

            const grid = document.getElementById('stats-grid');
            grid.innerHTML = '';
            
            Object.keys(userSettings.categories).forEach(key => {
                const cat = userSettings.categories[key];
                const value = totals[key] || 0;
                grid.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col justify-center">
                    <p class="text-xs text-slate-500 font-bold mb-1 flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-full inline-block" style="background-color:${cat.color}"></span> ${cat.label}
                    </p>
                    <p class="text-2xl font-black text-slate-800 ml-4">${value.toFixed(1)} <span class="text-xs font-semibold text-slate-400">h</span></p>
                </div>`;
            });
            
            if(document.getElementById('view-dashboard').classList.contains('block')) initChart(totals);
        }

        function initChart(totals = null) {
            if(!totals) return updateStats();
            
            const ctx = document.getElementById('balanceChart').getContext('2d');
            if(balanceChart) balanceChart.destroy();
            
            const labels = [], data = [], colors = [];
            
            Object.keys(totals).forEach(key => {
                if(totals[key] > 0) {
                    labels.push(userSettings.categories[key]?.label || '기타');
                    data.push(totals[key]);
                    colors.push(userSettings.categories[key]?.color || '#94a3b8');
                }
            });

            if(data.length === 0) { labels.push('일정 없음'); data.push(1); colors.push('#f1f5f9'); }

            balanceChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 3, borderColor: '#ffffff', borderRadius: 4 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { font: { weight: 'bold', family: 'Pretendard' }, usePointStyle: true, boxWidth: 8 } } } }
            });
        }

        function toggleGroup(grp) {
            currentGroup = grp;
            
            const btnWd = document.getElementById('grp-weekday');
            const btnWe = document.getElementById('grp-weekend');
            
            if(grp === 'weekday') {
                btnWd.className = "group-btn px-5 py-2 rounded-xl text-sm font-bold group-btn-active transition-colors";
                btnWe.className = "group-btn px-5 py-2 rounded-xl text-sm font-bold bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors";
            } else {
                btnWe.className = "group-btn px-5 py-2 rounded-xl text-sm font-bold group-btn-active transition-colors";
                btnWd.className = "group-btn px-5 py-2 rounded-xl text-sm font-bold bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 transition-colors";
            }
            
            activeDay = DAY_ORDER.find(k => currentWeekData.schedule[k] && currentWeekData.schedule[k].group === grp) || 'mon';
            renderTabs();
        }

        function renderTabs() {
            if(!currentWeekData) return;
            const tabs = document.getElementById('day-tabs');
            tabs.innerHTML = '';
            
            // DAY_ORDER를 기반으로 정렬 렌더링
            DAY_ORDER.forEach(dayKey => {
                if(currentWeekData.schedule[dayKey] && currentWeekData.schedule[dayKey].group === currentGroup) {
                    const isActive = activeDay === dayKey;
                    const btnClass = isActive 
                        ? 'bg-slate-800 text-white shadow-md' 
                        : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50';
                    tabs.innerHTML += `<button onclick="activeDay='${dayKey}';renderTabs();" class="px-5 py-2 rounded-xl text-sm font-bold flex-shrink-0 transition-all ${btnClass}">${currentWeekData.schedule[dayKey].title}</button>`;
                }
            });
            
            if(currentWeekData.schedule[activeDay]) {
                document.getElementById('current-day-label').innerText = `${currentWeekData.schedule[activeDay].title}`;
            }
            renderTimeline();
        }

        function renderTimeline() {
            const body = document.getElementById('timeline-body');
            body.innerHTML = '';
            
            if(!currentWeekData.schedule[activeDay] || currentWeekData.schedule[activeDay].events.length === 0) {
                body.innerHTML = '<div class="text-center py-10"><p class="text-slate-400 font-bold text-sm">등록된 일정이 없습니다.</p></div>';
                return;
            }

            currentWeekData.schedule[activeDay].events.sort((a,b) => a.time.localeCompare(b.time));

            currentWeekData.schedule[activeDay].events.forEach(ev => {
                const catInfo = userSettings.categories[ev.cat] || { label: "기타", color: "#94a3b8" };
                const bgColor = hexToRgba(catInfo.color, 0.04);
                
                const card = document.createElement('div');
                
                // 가독성을 극대화한 콤팩트 디자인
                card.innerHTML = `
                    <div class="flex items-center gap-2 sm:gap-4 p-2.5 sm:p-3.5 rounded-2xl border border-slate-200 bg-white shadow-sm relative overflow-hidden group">
                        <!-- 왼쪽 컬러 인디케이터 -->
                        <div class="absolute left-0 top-0 bottom-0 w-1.5" style="background-color: ${catInfo.color}"></div>
                        
                        <!-- 중앙 정보 영역 -->
                        <div class="flex flex-col flex-grow min-w-0 pl-2">
                            <div class="flex items-center gap-2 mb-0.5">
                                <input class="editable-input font-black text-[13px] text-slate-500 w-[85px] px-1 -ml-1" value="${ev.time}" onchange="updateEvent('${activeDay}', ${ev.id}, 'time', this.value)">
                                <select class="editable-input text-[11px] font-bold px-1 py-0.5 outline-none cursor-pointer" style="background-color:${hexToRgba(catInfo.color,0.1)}; color:${catInfo.color}" onchange="updateEvent('${activeDay}', ${ev.id}, 'cat', this.value)">
                                    ${Object.keys(userSettings.categories).map(k=>`<option value="${k}" ${k===ev.cat?'selected':''}>${userSettings.categories[k].label}</option>`).join('')}
                                </select>
                            </div>
                            <input class="editable-input font-black text-base text-slate-800 w-full px-1 -ml-1 truncate" value="${ev.task}" onchange="updateEvent('${activeDay}', ${ev.id}, 'task', this.value)">
                        </div>
                        
                        <!-- 우측 뱃지 및 삭제 버튼 -->
                        <div class="flex items-center gap-2 sm:gap-3 flex-shrink-0">
                            <div class="bg-slate-50 border border-slate-100 px-2 sm:px-3 py-1.5 rounded-xl flex items-center justify-center min-w-[3.5rem]">
                                <span class="text-[15px] font-black text-slate-700 leading-none">${ev.hours.toFixed(1)}</span><span class="text-[11px] font-bold text-slate-400 ml-0.5 leading-none mt-0.5">h</span>
                            </div>
                            <button onclick="deleteEvent('${activeDay}', ${ev.id})" class="text-slate-300 hover:text-rose-500 transition-colors p-2 rounded-lg hover:bg-rose-50">✕</button>
                        </div>
                    </div>`;
                body.appendChild(card);
            });
        }

        function renderWeeklyView() {
            if(!currentWeekData) return;
            const grid = document.getElementById('weekly-grid');
            grid.innerHTML = '';

            DAY_ORDER.forEach(dayKey => {
                const day = currentWeekData.schedule[dayKey];
                if(!day) return;

                let html = `<div class="bg-white rounded-2xl border border-slate-200 overflow-hidden flex flex-col week-view-col shadow-sm">
                    <div class="bg-slate-50 border-b border-slate-100 py-3 text-center">
                        <span class="font-black text-sm ${day.group==='weekend'?'text-rose-500':'text-slate-700'}">${day.title}</span>
                    </div>
                    <div class="p-2 space-y-2 flex-grow bg-slate-50/30">`;
                
                let sortedEvents = [...day.events].sort((a,b) => a.time.localeCompare(b.time));
                
                if(sortedEvents.length === 0) {
                    html += `<p class="text-center text-[11px] font-bold text-slate-300 mt-4">일정 없음</p>`;
                } else {
                    sortedEvents.forEach(ev => {
                        const catInfo = userSettings.categories[ev.cat] || { color: "#cbd5e1" };
                        const start = ev.time.split('-')[0].trim();
                        html += `
                            <div class="text-xs p-2.5 rounded-xl border border-slate-100 bg-white shadow-sm leading-tight cursor-pointer hover:border-blue-300 transition-colors" 
                                 style="border-left-width: 4px; border-left-color: ${catInfo.color};"
                                 onclick="setViewMode('daily'); toggleGroup('${day.group}'); activeDay='${dayKey}'; renderTabs();">
                                <span class="font-black text-slate-400 block mb-1 text-[10px]">${start}</span>
                                <span class="font-bold text-slate-700 line-clamp-2">${ev.task}</span>
                            </div>
                        `;
                    });
                }
                
                html += `</div></div>`;
                grid.innerHTML += html;
            });
        }

        function updateEvent(dayKey, eventId, field, value) {
            const idx = currentWeekData.schedule[dayKey].events.findIndex(e => e.id === eventId);
            if(idx === -1) return;
            
            currentWeekData.schedule[dayKey].events[idx][field] = value;
            if (field === 'time') currentWeekData.schedule[dayKey].events[idx].hours = calculateHours(value);
            saveWeekData();
        }

        function deleteEvent(dayKey, eventId) { 
            currentWeekData.schedule[dayKey].events = currentWeekData.schedule[dayKey].events.filter(e => e.id !== eventId);
            saveWeekData(); 
        }

        function openEventModal() {
            const catSelect = document.getElementById('modal-cat');
            catSelect.innerHTML = Object.keys(userSettings.categories).map(k => `<option value="${k}">${userSettings.categories[k].label}</option>`).join('');
            
            document.getElementById('modal-task').value = '';
            document.getElementById('modal-start-week').value = currentWeekStr;
            document.getElementById('modal-end-week').value = currentWeekStr;
            
            document.querySelectorAll('.modal-day-chk').forEach(cb => cb.checked = false);
            if(viewMode === 'daily') {
                const cb = document.querySelector(`.modal-day-chk[value="${activeDay}"]`);
                if(cb) cb.checked = true;
            }

            document.getElementById('event-modal').classList.remove('hidden');
        }

        function closeEventModal() {
            document.getElementById('event-modal').classList.add('hidden');
        }

        async function saveRecurringEvent() {
            const task = document.getElementById('modal-task').value.trim();
            const cat = document.getElementById('modal-cat').value;
            const time = document.getElementById('modal-time').value;
            const startW = document.getElementById('modal-start-week').value;
            const endW = document.getElementById('modal-end-week').value;
            
            const days = Array.from(document.querySelectorAll('.modal-day-chk:checked')).map(cb => cb.value);

            if(!task || !startW || !endW || days.length === 0) return;

            const startDate = new Date(weekToDate(startW));
            const endDate = new Date(weekToDate(endW));

            if(startDate > endDate) return;

            const btn = document.getElementById('modal-save-btn');
            btn.innerText = "처리 중...";
            btn.disabled = true;

            const batch = db.batch();
            let currDate = new Date(startDate);
            const eventHours = calculateHours(time);

            try {
                while(currDate <= endDate) {
                    const wStr = getYearWeek(currDate);
                    const docRef = db.collection("sync_data").doc(`week_${wStr}`);
                    const docSnap = await docRef.get();
                    
                    let wData = docSnap.exists ? docSnap.data() : { schedule: JSON.parse(JSON.stringify(DEFAULT_WEEK_TEMPLATE)) };
                    
                    days.forEach(d => {
                        wData.schedule[d].events.push({
                            id: Date.now() + Math.floor(Math.random() * 10000),
                            time: time,
                            task: task,
                            cat: cat,
                            hours: eventHours
                        });
                    });

                    batch.set(docRef, wData);
                    currDate.setDate(currDate.getDate() + 7); 
                }
                
                await batch.commit();
                closeEventModal();
                loadWeekData(); 
            } catch(e) {
                // error
            } finally {
                btn.innerText = "저장";
                btn.disabled = false;
            }
        }

        function renderCategorySettings() {
            if(!userSettings) return;
            const list = document.getElementById('category-list');
            list.innerHTML = '';
            
            Object.keys(userSettings.categories).forEach(key => {
                const cat = userSettings.categories[key];
                list.innerHTML += `
                    <div class="flex items-center gap-2 px-3 py-1.5 rounded-xl border border-slate-200 bg-slate-50 shadow-sm">
                        <span class="w-3 h-3 rounded-full shadow-inner" style="background-color: ${cat.color}"></span>
                        <span class="text-sm font-bold text-slate-700">${cat.label}</span>
                        <button onclick="deleteCategory('${key}')" class="text-slate-400 hover:text-rose-600 ml-1 font-bold">✕</button>
                    </div>
                `;
            });
        }

        function addCategory() {
            const name = document.getElementById('new-cat-name').value.trim();
            const color = document.getElementById('new-cat-color').value;
            if(!name) return;
            const newKey = "cat_" + Date.now();
            userSettings.categories[newKey] = { label: name, color: color };
            saveSettings();
            document.getElementById('new-cat-name').value = '';
        }

        function deleteCategory(key) {
            if(Object.keys(userSettings.categories).length <= 1) return;
            delete userSettings.categories[key];
            saveSettings();
        }

        function resetCurrentWeekData() { 
            currentWeekData = { schedule: JSON.parse(JSON.stringify(DEFAULT_WEEK_TEMPLATE)) };
            saveWeekData();
        }
        function exportData() {
            const exportObj = { week: currentWeekStr, data: currentWeekData };
            const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: "application/json" });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `plan_${currentWeekStr}_backup.json`; a.click();
        }
        function importData() {
            const file = document.getElementById('import-file').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { 
                try {
                    const parsed = JSON.parse(e.target.result);
                    if(parsed.data && parsed.data.schedule) {
                        currentWeekData = parsed.data; saveWeekData(); 
                    }
                } catch(err) {}
            };
            reader.readAsText(file);
        }

        window.onload = initApp;
    </script>
</body>
</html>
