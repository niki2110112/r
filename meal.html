<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초효율 식단 관리표 v9.0 (Synced)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f4f8; color: #0f172a; }
        .chart-container { position: relative; width: 100%; max-width: 350px; margin: auto; height: 280px; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        .group-btn-active { background-color: #2563eb; color: white; box-shadow: 0 2px 4px -1px rgba(37, 99, 235, 0.2); }
        .editable-input { background: transparent; border: 1px solid transparent; font-weight: inherit; color: inherit; padding: 4px 6px; border-radius: 6px; transition: all 0.2s ease-in-out; }
        .editable-input:hover { background: rgba(0,0,0,0.03); border-color: #cbd5e1; }
        .editable-input:focus { outline: none; border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
        select.editable-input { appearance: none; cursor: pointer; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .grid-7 { display: grid; grid-template-columns: repeat(7, minmax(180px, 1fr)); gap: 12px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1300px] mx-auto px-4 flex justify-between h-14 items-center">
            <h1 class="font-black text-lg text-blue-700 tracking-tight">MEAL PLANNER <span class="text-teal-600 font-medium text-xs ml-1 px-2 py-0.5 bg-teal-50 rounded">Synced v9.0</span></h1>
            <div class="flex space-x-2 sm:space-x-4 text-sm font-semibold">
                <button onclick="nav('dashboard')" id="nav-dashboard" class="nav-link tab-active py-4 px-2">대시보드</button>
                <button onclick="nav('monthly')" id="nav-monthly" class="nav-link py-4 px-2 text-slate-500 hover:text-slate-800 transition-colors">식단표</button>
                <button onclick="nav('inventory')" id="nav-inventory" class="nav-link py-4 px-2 text-slate-500 hover:text-slate-800 transition-colors">재고 관리</button>
                <button onclick="nav('settings')" id="nav-settings" class="nav-link py-4 px-2 text-slate-500 hover:text-slate-800 transition-colors">데이터 관리</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-[1300px] mx-auto px-4 py-6 w-full">
        
        <section id="view-dashboard" class="view block animate-fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start mb-8">
                <div class="space-y-4">
                    <div>
                        <h2 class="text-2xl font-black tracking-tight mb-1">데이터 분석 <span class="text-blue-600">리포트</span></h2>
                        <p class="text-slate-500 text-sm">클라우드 서버와 실시간으로 연동 중입니다.</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3" id="stats-grid"></div>
                    <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl shadow-sm">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-base">💡</span>
                            <h3 class="font-bold text-blue-900 text-sm">재고 부족 경고</h3>
                        </div>
                        <div id="low-stock-alert" class="space-y-2"></div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center justify-center lg:sticky lg:top-20">
                    <h3 class="font-bold text-slate-800 text-base mb-4 w-full text-left">재고 잔여 비율</h3>
                    <div class="chart-container w-full">
                        <canvas id="inventoryChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-monthly" class="view hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-2xl font-black tracking-tight mb-1">세부 식단 제어</h2>
                    <p class="text-slate-500 text-sm">입력 즉시 모든 기기에 자동 저장됩니다.</p>
                </div>
                <div class="flex bg-slate-200 p-1 rounded-lg shadow-inner overflow-x-auto scrollbar-hide">
                    <button onclick="changeWeek(0)" id="btn-week-0" class="week-btn group-btn-active px-6 py-2 rounded text-sm font-bold transition-all">1주차</button>
                    <button onclick="changeWeek(1)" id="btn-week-1" class="week-btn px-6 py-2 rounded text-sm font-bold text-slate-500">2주차</button>
                    <button onclick="changeWeek(2)" id="btn-week-2" class="week-btn px-6 py-2 rounded text-sm font-bold text-slate-500">3주차</button>
                    <button onclick="changeWeek(3)" id="btn-week-3" class="week-btn px-6 py-2 rounded text-sm font-bold text-slate-500">4주차</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                <div class="p-4 md:p-6 min-w-[1200px]">
                    <div class="grid-7 mb-4" id="calendar-header"></div>
                    <div class="grid-7" id="calendar-grid"></div>
                </div>
            </div>
        </section>

        <section id="view-inventory" class="view hidden max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black tracking-tight">재고 DB 관리</h2>
                <button onclick="addInventoryItem()" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-bold">+ 신규 재료 등록</button>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 border-b text-slate-600">
                        <tr><th class="px-6 py-4 font-bold">식재료명</th><th class="px-6 py-4 font-bold w-40">총 횟수</th><th class="px-6 py-4 font-bold w-32">잔여</th><th class="px-6 py-4 font-bold w-20">삭제</th></tr>
                    </thead>
                    <tbody id="inventory-tbody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="view-settings" class="view hidden max-w-2xl mx-auto">
            <h2 class="text-2xl font-black mb-6">데이터 관리</h2>
            <div class="bg-white rounded-2xl shadow-sm border p-6 space-y-6">
                <div>
                    <h3 class="font-bold text-lg mb-2">백업 및 복구</h3>
                    <div class="flex gap-2">
                        <button onclick="exportData()" class="bg-slate-800 text-white px-4 py-2 rounded text-sm font-bold">백업 다운로드</button>
                        <input type="file" id="import-file" class="hidden" onchange="importData()">
                        <button onclick="document.getElementById('import-file').click()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold">파일에서 복구</button>
                    </div>
                </div>
                <div class="pt-6 border-t border-rose-100">
                    <button onclick="resetData()" class="bg-rose-600 text-white px-6 py-3 rounded-lg text-sm font-bold w-full">⚠️ 클라우드 전체 초기화</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyBI8ox-eYSoM48mFuShwxiTlIna8eyaX6o",
            authDomain: "meal-c8b86.firebaseapp.com",
            projectId: "meal-c8b86",
            storageBucket: "meal-c8b86.firebasestorage.app",
            messagingSenderId: "476361866831",
            appId: "1:476361866831:web:d1f841697bcfb76dee743a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("sync_data").doc("meal");

        const DAYS_IN_MONTH = 28;
        const MEAL_TYPES = [
            { key: 'breakfast', label: '아침', bg: 'bg-white', border: 'border-slate-200', text: 'text-slate-600' },
            { key: 'lunch', label: '점심', bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700' },
            { key: 'snack', label: '간식', bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-500' },
            { key: 'dinner', label: '저녁', bg: 'bg-blue-100', border: 'border-blue-300', text: 'text-blue-800' }
        ];

        let CONFIG = null;
        let activeWeek = 0;
        let chartInstance = null;
        let isFirstLoad = true;

        function init() {
            docRef.onSnapshot((doc) => {
                if (doc.exists) {
                    CONFIG = doc.data();
                } else {
                    CONFIG = {
                        inventory: [
                            { id: 101, name: "닭가슴살", total: 20 },
                            { id: 102, name: "햇반", total: 15 }
                        ],
                        meals: Array.from({ length: DAYS_IN_MONTH }, (_, i) => ({
                            day: i + 1, breakfast: { text: "", items: [] }, lunch: { text: "", items: [] }, snack: { text: "", items: [] }, dinner: { text: "", items: [] }
                        }))
                    };
                    if(isFirstLoad) save();
                }
                isFirstLoad = false;
                refreshSystem();
            });
        }

        function save() { docRef.set(CONFIG); }

        function refreshSystem() {
            calculateRemainingStock();
            renderDashboard();
            renderMonthly();
            renderInventory();
            if(document.getElementById('view-dashboard').classList.contains('block')) renderDashboardChart();
        }

        function calculateRemainingStock() {
            CONFIG.inventory.forEach(inv => {
                let used = 0;
                CONFIG.meals.forEach(day => {
                    MEAL_TYPES.forEach(mt => {
                        used += day[mt.key].items.filter(id => id === inv.id).length;
                    });
                });
                inv.remaining = inv.total - used;
            });
        }

        function nav(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('tab-active', 'text-slate-500'));
            document.getElementById(`nav-${viewId}`).classList.add('tab-active');
            if(viewId === 'dashboard') renderDashboardChart();
        }

        function renderDashboard() {
            const gridEl = document.getElementById('stats-grid');
            const alertEl = document.getElementById('low-stock-alert');
            const lowItems = CONFIG.inventory.filter(i => i.remaining <= 2);
            gridEl.innerHTML = `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-center">
                    <p class="text-xs text-slate-500 font-bold mb-1">등록된 식재료</p>
                    <p class="text-2xl font-black text-blue-700">${CONFIG.inventory.length} <span class="text-sm font-semibold opacity-60">종</span></p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-center">
                    <p class="text-xs text-slate-500 font-bold mb-1">소진 임박</p>
                    <p class="text-2xl font-black ${lowItems.length > 0 ? 'text-rose-600' : 'text-slate-700'}">${lowItems.length} <span class="text-sm font-semibold opacity-60">개</span></p>
                </div>
            `;
            alertEl.innerHTML = lowItems.length === 0 ? '<p class="text-sm text-blue-800">부족한 재고가 없습니다.</p>' : 
                lowItems.map(inv => `<div class="flex justify-between items-center text-sm bg-white/60 p-2 rounded border border-blue-200"><span class="font-bold text-rose-600">${inv.name}</span><span class="font-black text-rose-700">${inv.remaining}회 남음</span></div>`).join('');
        }

        function renderDashboardChart() {
            const ctx = document.getElementById('inventoryChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: CONFIG.inventory.map(i => i.name),
                    datasets: [{ data: CONFIG.inventory.map(i => i.remaining), backgroundColor: ['#2563eb', '#3b82f6', '#60a5fa', '#93c5fd', '#bfdbfe'], borderWidth: 2, borderColor: '#ffffff' }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { font: { weight: 'bold' } } } } }
            });
        }

        function changeWeek(idx) {
            activeWeek = idx;
            document.querySelectorAll('.week-btn').forEach((btn, i) => {
                btn.className = i === idx ? "week-btn group-btn-active px-6 py-2 rounded text-sm font-bold" : "week-btn px-6 py-2 rounded text-sm font-bold text-slate-500";
            });
            renderMonthly();
        }

        function renderMonthly() {
            const header = document.getElementById('calendar-header');
            const grid = document.getElementById('calendar-grid');
            header.innerHTML = ''; grid.innerHTML = '';
            const weekDays = ["월요일", "화요일", "수요일", "목요일", "금요일", "토요일", "일요일"];
            const startDay = activeWeek * 7;

            for (let i = 0; i < 7; i++) {
                const dayIdx = startDay + i;
                if (dayIdx >= DAYS_IN_MONTH) break;
                header.innerHTML += `<div class="bg-slate-800 text-white p-3 rounded-xl flex justify-between items-center shadow-sm"><div><span class="text-[10px] font-bold opacity-70">DAY ${dayIdx+1}</span><div class="text-sm font-black">${weekDays[i]}</div></div><button onclick="copyYesterday(${dayIdx})" class="text-white/60 hover:text-white" title="어제 식단 복사"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button></div>`;

                let colHTML = `<div class="flex flex-col gap-3">`;
                MEAL_TYPES.forEach(mt => {
                    const mealData = CONFIG.meals[dayIdx][mt.key];
                    const tagsHTML = mealData.items.map((itemId, tagIdx) => {
                        const inv = CONFIG.inventory.find(inv => inv.id === itemId);
                        return inv ? `<div class="inline-flex items-center gap-1 bg-white border px-1.5 py-0.5 rounded text-[10px] font-bold text-slate-600 mt-1 mr-1"><span>${inv.name}</span><button onclick="removeTag(${dayIdx}, '${mt.key}', ${tagIdx})" class="text-slate-400 hover:text-rose-500">✕</button></div>` : '';
                    }).join('');

                    colHTML += `<div class="p-3 rounded-xl ${mt.bg} border ${mt.border} shadow-sm flex flex-col gap-2"><div class="flex justify-between items-center"><span class="text-xs font-black ${mt.text}">${mt.label}</span><select class="editable-input text-[11px] font-bold ${mt.text} w-auto bg-transparent outline-none" onchange="addTag(${dayIdx}, '${mt.key}', this)"><option value="">+ 추가</option>${CONFIG.inventory.map(inv=>`<option value="${inv.id}">${inv.name}${inv.remaining<=0?'(소진)':''}</option>`).join('')}</select></div><input class="editable-input text-sm font-bold text-slate-900 w-full placeholder:text-slate-400 placeholder:font-normal" value="${mealData.text}" placeholder="메뉴 입력" onchange="updateMealText(${dayIdx}, '${mt.key}', this.value)"><div class="flex flex-wrap min-h-[4px]">${tagsHTML}</div></div>`;
                });
                grid.innerHTML += colHTML + `</div>`;
            }
        }

        function updateMealText(dayIdx, type, text) { CONFIG.meals[dayIdx][type].text = text; save(); }
        function addTag(dayIdx, type, sel) { if(!sel.value) return; CONFIG.meals[dayIdx][type].items.push(parseInt(sel.value)); sel.value=""; save(); }
        function removeTag(dayIdx, type, tagIdx) { CONFIG.meals[dayIdx][type].items.splice(tagIdx, 1); save(); }
        function copyYesterday(idx) { if(idx===0) return; if(confirm('어제 식단을 복사할까요?')) { MEAL_TYPES.forEach(mt=>CONFIG.meals[idx][mt.key]=JSON.parse(JSON.stringify(CONFIG.meals[idx-1][mt.key]))); save(); } }

        function renderInventory() {
            const tbody = document.getElementById('inventory-tbody'); tbody.innerHTML = '';
            CONFIG.inventory.forEach(inv => {
                tbody.innerHTML += `<tr class="hover:bg-slate-50 transition-colors"><td class="px-6 py-3"><input type="text" value="${inv.name}" class="editable-input font-bold text-slate-900 w-full" onchange="updateInvName(${inv.id}, this.value)"></td><td class="px-6 py-3"><div class="flex items-center gap-2"><input type="number" value="${inv.total}" class="editable-input w-20 text-center font-mono border" onchange="updateInvTotal(${inv.id}, this.value)"><span>회</span></div></td><td class="px-6 py-3 font-black ${inv.remaining<=2?'text-rose-600':'text-blue-600'}">${inv.remaining}회</td><td class="px-6 py-3 text-center"><button onclick="deleteInv(${inv.id})" class="text-slate-400 hover:text-rose-600">✕</button></td></tr>`;
            });
        }

        function addInventoryItem() { const name=prompt("재료명?"); if(name) { CONFIG.inventory.push({id:Date.now(), name, total:10}); save(); } }
        function updateInvName(id, val) { const item=CONFIG.inventory.find(i=>i.id===id); if(item) { item.name=val; save(); } }
        function updateInvTotal(id, val) { const item=CONFIG.inventory.find(i=>i.id===id); if(item) { item.total=parseInt(val); save(); } }
        function deleteInv(id) { if(confirm('삭제?')) { CONFIG.inventory=CONFIG.inventory.filter(i=>i.id!==id); save(); } }

        function resetData() { if(confirm('모든 데이터를 클라우드에서 삭제하시겠습니까?')) docRef.delete().then(()=>location.reload()); }
        function exportData() {
            const blob = new Blob([JSON.stringify(CONFIG, null, 2)], { type: "application/json" });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `meal_cloud_backup.json`; a.click();
        }
        function importData() {
            const file = document.getElementById('import-file').files[0];
            const reader = new FileReader();
            reader.onload = (e) => { CONFIG = JSON.parse(e.target.result); save(); };
            reader.readAsText(file);
        }

        window.onload = init;
    </script>
</body>
</html>
