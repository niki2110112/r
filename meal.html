<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> project! (Integrated Cloud)</title>
    <!-- Libraries (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase (Compat Version for simplicity like your legacy code) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        input[type="checkbox"] { accent-color: #3b82f6; width: 1.125rem; height: 1.125rem; cursor: pointer; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // --- Firebase Config & Environment Setup ---
        let firebaseConfig;
        let appId = "hydrogel-os-final";

        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
            appId = typeof __app_id !== 'undefined' ? __app_id : "hydrogel-os-final";
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyBI8ox-eYSoM48mFuShwxiTlIna8eyaX6o",
                authDomain: "meal-c8b86.firebaseapp.com",
                projectId: "meal-c8b86",
                storageBucket: "meal-c8b86.firebasestorage.app",
                messagingSenderId: "476361866831",
                appId: "1:476361866831:web:d1f841697bcfb76dee743a"
            };
        }
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- Constants ---
        const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const START_HOUR = 7; // 오전 7시 시작
        const TOTAL_HOURS = 24;
        const HOURS = Array.from({ length: TOTAL_HOURS }, (_, i) => i);
        const SNAP_STEP = 0.25; 
        const HOUR_HEIGHT = 80; // 가독성을 위해 블록 높이 증가
        const GRID_HEIGHT = TOTAL_HOURS * HOUR_HEIGHT;

        // --- Utils ---
        const snap = (v) => Math.round(v / SNAP_STEP) * SNAP_STEP;
        const formatTime = (t) => {
            const absoluteTime = t + START_HOUR;
            const h = Math.floor(absoluteTime) % 24;
            const m = Math.round((absoluteTime - Math.floor(absoluteTime)) * 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        };

        // --- Components ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}"></i>`;
                    lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);
            return <span ref={spanRef} style={{ display: 'contents' }}></span>;
        };

        const CleanInput = ({ value, onChange, className, placeholder, multiline = false }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [temp, setTemp] = useState(value);
            useEffect(() => setTemp(value), [value]);

            const commit = () => {
                setIsEditing(false);
                if (temp.trim() !== value) onChange(temp.trim() || placeholder);
            };

            const inputClasses = `bg-blue-50/50 border border-blue-400 outline-none rounded-lg p-1.5 focus:ring-2 focus:ring-blue-500/20 transition-all ${className}`;

            if (isEditing) {
                return multiline ? (
                    <textarea 
                        autoFocus className={inputClasses}
                        value={temp} onChange={e => setTemp(e.target.value)} onBlur={commit}
                    />
                ) : (
                    <input 
                        autoFocus className={inputClasses}
                        value={temp} onChange={e => setTemp(e.target.value)} onBlur={commit}
                        onKeyDown={e => e.key === 'Enter' && commit()}
                    />
                );
            }
            return (
                <div onClick={e => { e.stopPropagation(); setIsEditing(true); }} className={`cursor-text truncate hover:bg-slate-100/70 p-1.5 rounded-lg transition-colors ${!value ? 'text-slate-400 italic' : ''} ${className}`}>
                    {value || placeholder}
                </div>
            );
        };

        const TaskDetailPane = ({ task, updateTask, onClose, isModal = false }) => {
            if (!task) return null;
            return (
                <div className={`flex flex-col h-full bg-white overflow-hidden ${isModal ? '' : 'border border-slate-200 rounded-[24px] shadow-xl'}`}>
                    <div className="px-8 py-6 border-b border-slate-100 bg-white flex justify-between items-start gap-6">
                        <div className="flex-1 min-w-0">
                            <CleanInput 
                                value={task.title} 
                                onChange={v => updateTask(task.id, { title: v })} 
                                className="text-2xl font-bold text-slate-800 w-full mb-2 tracking-tight" 
                                placeholder="모듈명 (큰 틀) 입력..."
                            />
                            <textarea 
                                className="w-full bg-slate-50/50 border border-slate-100 rounded-xl p-4 text-sm text-slate-600 outline-none resize-none focus:ring-2 focus:ring-slate-200 transition-all custom-scroll"
                                rows="2"
                                placeholder="이 설계 모듈의 전체적인 목표와 개요를 작성하십시오..."
                                value={task.description || ''} 
                                onChange={e => updateTask(task.id, { description: e.target.value })}
                            />
                        </div>
                        <button onClick={onClose} className="p-2.5 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-xl shrink-0 transition-colors"><Icon name="x" className="w-5 h-5"/></button>
                    </div>
                    <div className="flex-1 overflow-y-auto px-8 py-6 custom-scroll space-y-10 bg-slate-50/30">
                        <section>
                            <h3 className="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2"><Icon name="check-square" className="text-blue-500 w-5 h-5" /> 세부 일정 (Sub-Checkpoints)</h3>
                            <div className="space-y-3">
                                {(task.checkpoints || []).map((cp, idx) => (
                                    <div key={cp.id} className="flex items-center gap-4 p-4 bg-white border border-slate-200 rounded-xl shadow-sm group/item transition-all hover:border-blue-300">
                                        <input type="checkbox" checked={cp.done} onChange={e => {
                                            const n = [...(task.checkpoints || [])]; n[idx].done = e.target.checked;
                                            updateTask(task.id, { checkpoints: n });
                                        }} />
                                        <CleanInput value={cp.text} onChange={v => {
                                            const n = [...(task.checkpoints || [])]; n[idx].text = v;
                                            updateTask(task.id, { checkpoints: n });
                                        }} className={`text-sm font-medium w-full ${cp.done ? 'text-slate-400 line-through' : 'text-slate-700'}`} placeholder="세부 항목 입력..." />
                                        <button onClick={() => updateTask(task.id, { checkpoints: (task.checkpoints || []).filter(c => c.id !== cp.id) })} className="opacity-0 group-hover/item:opacity-100 text-slate-300 hover:text-red-500 transition-all p-1.5 hover:bg-red-50 rounded-lg"><Icon name="trash-2" /></button>
                                    </div>
                                ))}
                                <button onClick={() => updateTask(task.id, { checkpoints: [...(task.checkpoints || []), { id: `c${Date.now()}`, text: '', done: false }] })} className="w-full py-4 bg-white border-2 border-dashed border-slate-200 rounded-xl text-sm font-semibold text-slate-500 hover:text-blue-600 hover:border-blue-400 hover:bg-blue-50/50 transition-all">+ 항목 추가하기</button>
                            </div>
                        </section>
                        <section className="flex flex-col flex-1 min-h-[350px]">
                            <h3 className="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2"><Icon name="file-text" className="text-blue-500 w-5 h-5" /> 엔지니어링 저널 (Engineering Journal)</h3>
                            <textarea 
                                className="w-full flex-1 bg-white border border-slate-200 rounded-xl p-6 text-sm text-slate-700 leading-relaxed outline-none focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition-all custom-scroll shadow-sm"
                                placeholder="수식 및 해석 근거, 핵심 원리를 기록하십시오..."
                                value={task.log || ''} onChange={e => updateTask(task.id, { log: e.target.value })}
                            />
                        </section>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [data, setData] = useState({ projectName: "프로젝트", tasks: [], blocks: [] });
            const [view, setView] = useState('overview');
            const [activeTaskId, setActiveTaskId] = useState(null);
            const [modalTaskId, setModalTaskId] = useState(null);
            const [syncStatus, setSyncStatus] = useState('초기화 중...');

            // Auth
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                        setSyncStatus('로컬 모드 (오프라인)');
                        setUser({ uid: 'local_offline_user' });
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged(u => {
                    if (u) setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // Sync
            useEffect(() => {
                if (!user) return;
                if (user.uid === 'local_offline_user') return; 
                
                const docRef = db.collection("artifacts").doc(appId).collection("users").doc(user.uid).collection("hydrogel_data").doc("main");
                
                const unsubscribe = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        const fetchedData = doc.data();
                        setData({
                            projectName: fetchedData.projectName || "프로젝트",
                            tasks: fetchedData.tasks || [],
                            blocks: fetchedData.blocks || []
                        });
                    } else {
                        docRef.set({ projectName: "새 프로젝트", tasks: [], blocks: [] });
                    }
                    setSyncStatus('클라우드 동기화됨');
                }, (error) => {
                    console.error("Sync error:", error);
                    setSyncStatus('동기화 오류');
                });
                
                return () => unsubscribe();
            }, [user]);

            const save = (newData) => {
                if (!user) return;
                if (user.uid === 'local_offline_user') {
                    setSyncStatus('로컬 모드 (저장되지 않음)');
                    return;
                }
                
                setSyncStatus('저장 중...');
                const docRef = db.collection("artifacts").doc(appId).collection("users").doc(user.uid).collection("hydrogel_data").doc("main");
                
                docRef.set(newData)
                    .then(() => setSyncStatus('클라우드 동기화됨'))
                    .catch((e) => { 
                        console.error(e); 
                        setSyncStatus('저장 오류'); 
                    });
            };

            const globalYield = useMemo(() => {
                const safeTasks = data.tasks || [];
                const allCps = safeTasks.flatMap(t => t.checkpoints || []);
                if (allCps.length === 0) return 0;
                return Math.round((allCps.filter(c => c.done).length / allCps.length) * 100);
            }, [data.tasks]);

            const activeTask = (data.tasks || []).find(t => t.id === activeTaskId);

            const updateTask = (tid, updates) => {
                const nextTasks = (data.tasks || []).map(t => t.id === tid ? { ...t, ...updates } : t);
                const next = { ...data, tasks: nextTasks };
                setData(next);
                save(next);
            };

            const addTask = () => {
                const newTask = { id: `t${Date.now()}`, title: '신규 설계 모듈', description: '', log: '', checkpoints: [] };
                const next = { ...data, tasks: [...(data.tasks || []), newTask] };
                setData(next);
                save(next);
                setActiveTaskId(newTask.id);
            };

            const deleteTask = (tid) => {
                const next = { 
                    ...data, 
                    tasks: (data.tasks || []).filter(t => t.id !== tid), 
                    blocks: (data.blocks || []).filter(b => b.taskId !== tid) 
                };
                setData(next);
                save(next);
                if (activeTaskId === tid) setActiveTaskId(null);
            };

            const handleExport = () => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `backup_hydrogel_${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData && Array.isArray(importedData.tasks)) {
                            setData(importedData);
                            save(importedData);
                        }
                    } catch (err) {
                        console.error("Parse error:", err);
                    }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            return (
                <div className="flex h-screen w-full text-slate-800 overflow-hidden relative font-sans">
                    {/* Sidebar */}
                    <aside className="w-20 lg:w-64 bg-slate-900 text-slate-400 flex flex-col shrink-0 transition-all border-r border-slate-800">
                        <div className="h-20 flex items-center justify-center border-b border-slate-800/50">
                            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/30">
                                <Icon name="cpu" className="w-5 h-5" />
                            </div>
                            <span className="hidden lg:block ml-3 font-bold text-slate-200 tracking-wide">HYDROGEL</span>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2">
                            <button onClick={() => setView('overview')} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-sm ${view === 'overview' ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-slate-200'}`}>
                                <Icon name="layout-dashboard" />
                                <span className="hidden lg:block">Overview</span>
                            </button>
                            <button onClick={() => setView('scheduler')} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-semibold text-sm ${view === 'scheduler' ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-slate-200'}`}>
                                <Icon name="calendar-days" />
                                <span className="hidden lg:block">Scheduler</span>
                            </button>
                        </nav>
                        <div className="p-6 border-t border-slate-800/50 hidden lg:block bg-slate-900/50">
                            <div className="flex justify-between text-xs font-bold text-slate-500 mb-2.5 tracking-wider">
                                <span>TOTAL YIELD</span><span className="text-blue-400">{globalYield}%</span>
                            </div>
                            <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                <div className="bg-blue-500 h-full transition-all duration-1000 ease-out" style={{width: `${globalYield}%`}}></div>
                            </div>
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 flex flex-col min-w-0 bg-[#f8fafc]">
                        <header className="h-20 flex items-center px-8 bg-white border-b border-slate-200 shrink-0 z-20 gap-4 shadow-sm">
                            <CleanInput value={data.projectName} onChange={v => { const next = {...data, projectName: v}; setData(next); save(next); }} className="text-xl font-bold text-slate-800 flex-1" />
                            
                            <div className="flex items-center gap-3">
                                <label className="cursor-pointer bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 text-sm px-4 py-2 rounded-lg font-medium transition-all flex items-center gap-2 shadow-sm">
                                    <Icon name="upload" className="w-4 h-4" />
                                    <span>가져오기</span>
                                    <input type="file" accept=".json" className="hidden" onChange={handleImport} />
                                </label>
                                <button onClick={handleExport} className="bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 text-sm px-4 py-2 rounded-lg font-medium transition-all flex items-center gap-2 shadow-sm">
                                    <Icon name="download" className="w-4 h-4" />
                                    <span>내보내기</span>
                                </button>
                            </div>

                            <div className="flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-lg border border-slate-200">
                                <Icon name="cloud" className={`w-4 h-4 ${syncStatus.includes('동기화됨') ? 'text-emerald-500' : 'text-blue-500'}`} />
                                <span className="text-xs font-semibold text-slate-500">{syncStatus}</span>
                            </div>
                        </header>

                        <div className="flex-1 overflow-hidden relative p-8">
                            {view === 'overview' ? (
                                <div className="h-full flex gap-8 animate-fade-in">
                                    <div className="w-full lg:w-[420px] flex flex-col h-full bg-white border border-slate-200 rounded-[24px] overflow-hidden shadow-lg shrink-0">
                                        <div className="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white">
                                            <h2 className="text-base font-bold text-slate-800">모듈 리스트</h2>
                                            <button onClick={addTask} className="bg-blue-50 text-blue-600 p-2 rounded-lg hover:bg-blue-100 transition-colors border border-blue-200/50"><Icon name="plus" className="w-4 h-4"/></button>
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scroll bg-slate-50/50">
                                            {(data.tasks || []).map(t => {
                                                const cps = t.checkpoints || [];
                                                const progress = cps.length === 0 ? 0 : Math.round((cps.filter(c=>c.done).length / cps.length) * 100);
                                                return (
                                                    <div key={t.id} onClick={() => setActiveTaskId(t.id)} className={`group bg-white border rounded-2xl p-5 cursor-pointer transition-all shadow-sm ${activeTaskId === t.id ? 'border-blue-400 ring-2 ring-blue-50' : 'border-slate-200 hover:border-slate-300 hover:shadow-md'}`}>
                                                        <div className="flex justify-between items-start mb-4 gap-3">
                                                            <CleanInput value={t.title} onChange={v => updateTask(t.id, {title: v})} className={`text-sm font-bold flex-1 ${progress === 100 ? 'text-slate-400 line-through' : 'text-slate-800'}`} />
                                                            <button onClick={e => { e.stopPropagation(); deleteTask(t.id); }} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 p-1 hover:bg-red-50 rounded transition-all"><Icon name="trash-2" className="w-4 h-4"/></button>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <div className="flex-1 bg-slate-100 h-1.5 rounded-full overflow-hidden">
                                                                <div className="bg-blue-500 h-full transition-all duration-700 ease-out" style={{width: `${progress}%`}}></div>
                                                            </div>
                                                            <span className="text-xs font-bold text-slate-500 w-8 text-right">{progress}%</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    
                                    {activeTask ? (
                                        <div className="flex-1">
                                            <TaskDetailPane task={activeTask} updateTask={updateTask} onClose={() => setActiveTaskId(null)} />
                                        </div>
                                    ) : (
                                        <div className="flex-1 flex flex-col items-center justify-center text-slate-400 bg-slate-50/50 border-2 border-dashed border-slate-200 rounded-[24px]">
                                            <Icon name="layout-template" className="w-12 h-12 mb-4 text-slate-300" />
                                            <p className="text-sm font-semibold">좌측에서 모듈을 선택하여 세부 내용을 열람하십시오.</p>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <SchedulerView tasks={data.tasks || []} blocks={data.blocks || []} onUpdate={next => { setData({...data, ...next}); save({...data, ...next}); }} updateTask={updateTask} onOpenTask={setModalTaskId} />
                            )}
                        </div>
                    </main>

                    {modalTaskId && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-6 animate-fade-in" onClick={() => setModalTaskId(null)}>
                            <div className="w-full max-w-4xl h-[85vh] bg-white rounded-[24px] shadow-2xl overflow-hidden" onClick={e => e.stopPropagation()}>
                                <TaskDetailPane task={(data.tasks || []).find(t=>t.id===modalTaskId)} updateTask={updateTask} onClose={() => setModalTaskId(null)} isModal={true} />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const SchedulerView = ({ tasks, blocks, onUpdate, updateTask, onOpenTask }) => {
            const [dragState, setDragState] = useState(null);
            const gridRef = useRef(null);

            const handleDragStart = (e, tid, cid) => {
                e.dataTransfer.setData('application/json', JSON.stringify({ tid, cid }));
            };

            const handleDrop = (e, day) => {
                e.preventDefault();
                const { tid, cid } = JSON.parse(e.dataTransfer.getData('application/json'));
                const rect = e.currentTarget.getBoundingClientRect();
                const start = snap((e.clientY - rect.top) / HOUR_HEIGHT);
                onUpdate({ blocks: [...blocks, { id: `b${Date.now()}`, taskId: tid, checkpointId: cid, day, start, end: start + 1.5 }] });
            };

            const handleMouseDown = (e, b, action) => {
                e.stopPropagation();
                setDragState({ action, bid: b.id, startY: e.clientY, oStart: b.start, oEnd: b.end, oDay: b.day });
            };

            useEffect(() => {
                const move = (e) => {
                    if (!dragState) return;
                    const delta = snap((e.clientY - dragState.startY) / HOUR_HEIGHT);
                    onUpdate({ blocks: blocks.map(b => {
                        if (b.id !== dragState.bid) return b;
                        if (dragState.action === 'resize') return { ...b, end: Math.max(b.start + 0.5, dragState.oEnd + delta) };
                        if (dragState.action === 'move') {
                            const dur = dragState.oEnd - dragState.oStart;
                            let nDay = dragState.oDay;
                            if (gridRef.current) {
                                const rect = gridRef.current.getBoundingClientRect();
                                const colW = (rect.width - 64) / 7; // 왼쪽 16rem(64px) 여백 제외
                                const relX = e.clientX - rect.left - 64;
                                nDay = Math.max(0, Math.min(6, Math.floor(relX / colW)));
                            }
                            return { ...b, start: Math.max(0, dragState.oStart + delta), end: Math.min(TOTAL_HOURS, dragState.oStart + delta + dur), day: nDay };
                        }
                        return b;
                    }) });
                };
                const up = () => setDragState(null);
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', up);
                return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
            }, [dragState, blocks]);

            return (
                <div className="h-full flex gap-8 animate-fade-in" ref={gridRef}>
                    <div className="w-80 bg-white border border-slate-200 rounded-[24px] flex flex-col overflow-hidden shadow-lg shrink-0">
                        <div className="px-6 py-5 border-b border-slate-100 bg-white font-bold text-sm text-slate-700">대기 중인 리소스</div>
                        <div className="flex-1 overflow-y-auto p-5 space-y-6 custom-scroll bg-slate-50/50">
                            {tasks.map(t => (
                                <div key={t.id} className="space-y-3">
                                    <div className="text-xs font-bold text-slate-500 border-b border-slate-200 pb-1.5 truncate">{t.title}</div>
                                    {(t.checkpoints || []).filter(c=>!c.done).map(cp => (
                                        <div key={cp.id} draggable onDragStart={e => handleDragStart(e, t.id, cp.id)} className="p-3.5 bg-white border border-slate-200 rounded-xl cursor-grab active:cursor-grabbing hover:border-blue-400 hover:shadow-md shadow-sm transition-all flex items-center gap-3">
                                            <Icon name="grip-vertical" className="w-4 h-4 text-slate-400" />
                                            <span className="text-sm font-medium text-slate-700 leading-tight">{cp.text || '제목 없음'}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="flex-1 bg-white border border-slate-200 rounded-[24px] overflow-hidden shadow-lg flex flex-col">
                        <div className="flex border-b border-slate-200 bg-slate-50 sticky top-0 z-30 pl-16">
                            {DAYS.map(d => <div key={d} className="flex-1 py-4 text-center border-l border-slate-200 font-bold text-sm text-slate-600 tracking-wider">{d}</div>)}
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scroll relative">
                            <div className="flex relative bg-slate-50/30" style={{ height: GRID_HEIGHT }}>
                                <div className="w-16 shrink-0 border-r border-slate-200 bg-white sticky left-0 z-20">
                                    {HOURS.map(h => (
                                        <div key={h} className="absolute w-full flex justify-center -translate-y-1/2" style={{ top: h * HOUR_HEIGHT }}>
                                            <span className="text-xs font-semibold text-slate-400 font-mono">
                                                {((h + START_HOUR) % 24).toString().padStart(2, '0')}:00
                                            </span>
                                        </div>
                                    ))}
                                </div>
                                {DAYS.map((_, di) => (
                                    <div key={di} className="flex-1 relative border-l border-slate-200/60" onDragOver={e => e.preventDefault()} onDrop={e => handleDrop(e, di)}>
                                        {HOURS.map(h => <div key={h} className="absolute w-full border-t border-slate-200/50 pointer-events-none" style={{ top: h * HOUR_HEIGHT, height: HOUR_HEIGHT }} />)}
                                        {blocks.filter(b => b.day === di).map(b => {
                                            const task = tasks.find(t => t.id === b.taskId);
                                            const cp = (task?.checkpoints || []).find(c => c.id === b.checkpointId);
                                            if(!task || !cp) return null;
                                            return (
                                                <div key={b.id} onDoubleClick={() => onOpenTask(task.id)} className={`absolute left-1 right-1 rounded-xl border flex flex-col overflow-hidden shadow-sm transition-all group hover:shadow-md ${cp.done ? 'bg-slate-100/90 border-slate-300' : 'bg-blue-50/90 border-blue-300'}`} style={{ top: b.start * HOUR_HEIGHT, height: (b.end - b.start) * HOUR_HEIGHT, zIndex: 10 }}>
                                                    <div className="flex-1 p-3 cursor-move flex flex-col relative" onMouseDown={e => handleMouseDown(e, b, 'move')}>
                                                        <span className={`text-[10px] font-bold uppercase truncate mb-1.5 ${cp.done ? 'text-slate-500' : 'text-blue-600'}`}>{task.title}</span>
                                                        <div className="flex items-start gap-2.5" onMouseDown={e => e.stopPropagation()}>
                                                            <input type="checkbox" checked={cp.done} onChange={e => {
                                                                const n = [...(task.checkpoints || [])];
                                                                const idx = n.findIndex(c => c.id === cp.id);
                                                                n[idx].done = e.target.checked;
                                                                updateTask(task.id, { checkpoints: n });
                                                            }} className="mt-0.5 w-3.5 h-3.5" />
                                                            <CleanInput value={cp.text} onChange={v => {
                                                                const n = [...(task.checkpoints || [])];
                                                                const idx = n.findIndex(c => c.id === cp.id);
                                                                n[idx].text = v;
                                                                updateTask(task.id, { checkpoints: n });
                                                            }} className={`text-xs font-semibold leading-snug w-full bg-transparent border-none p-0 focus:ring-0 ${cp.done ? 'line-through text-slate-500' : 'text-slate-800'}`} />
                                                        </div>
                                                        <div className="mt-auto text-[10px] font-medium text-slate-500 flex items-center gap-1.5 pt-2"><Icon name="clock" className="w-3 h-3" /> {formatTime(b.start)}</div>
                                                        <button onClick={e => { e.stopPropagation(); onUpdate({ blocks: blocks.filter(x => x.id !== b.id) }); }} className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-slate-400 hover:text-red-500 hover:bg-red-50 p-1 rounded transition-all"><Icon name="x" className="w-3.5 h-3.5" /></button>
                                                    </div>
                                                    <div className="h-2.5 w-full cursor-ns-resize hover:bg-black/5 flex items-center justify-center transition-colors" onMouseDown={e => handleMouseDown(e, b, 'resize')}>
                                                        <div className="w-8 h-1 bg-slate-300 rounded-full" />
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
